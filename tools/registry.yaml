# v2 §8.5 — Tool Registry.
# Each tool is invoked via ToolExecutor. Adapter selection (which concrete class
# implements a tool name) is decided in backend/app/config/profiles.py, in the
# build_runtime() branch on settings.retriever_backend. This file defines only
# the execution policy — timeout_ms / retry / required — and the registry
# loader does NOT perform variable interpolation.

tools:
  retriever.search:
    version: v1
    adapter: env:RETRIEVER_BACKEND   # opensearch | local — wired in profiles.py
    timeout_ms: 5000
    retry: 1
    required: true

  # v3.1 Node 5 — cross-encoder reranker. 1차 검색(hybrid) 후보 풀을 재정렬해
  # RRF 융합을 대체한다. required:false — 실패/미배선 시 dispatcher 가 1차 검색
  # 순서로 graceful degrade(rerank 점수 부재 → Node 6 G2 semantic 0.0).
  # Phase 0–3 은 local fake(LocalRerankerTool), 실 cross-encoder 는 후속 Phase.
  retriever.rerank:
    version: v1
    adapter: local
    timeout_ms: 3000
    retry: 0
    required: false

  document.resolve_citation:
    version: v1
    adapter: env:RETRIEVER_BACKEND   # opensearch | local — wired in profiles.py
    timeout_ms: 2000
    retry: 0
    required: true

  # v3.1 P1 Section auto-merge / P2 다홉 — 한 Section 형제 문단 메타 표적 fetch.
  # required:false — 컨텍스트 *보강*용이라 실패해도 답변을 막지 않는다(leaf 로 진행).
  document.fetch_section:
    version: v1
    adapter: env:RETRIEVER_BACKEND   # opensearch | local — wired in profiles.py
    timeout_ms: 3000
    retry: 0
    required: false

  memory.session_load:
    version: v1
    adapter: postgres
    timeout_ms: 1000
    retry: 0
    required: false

  memory.session_update:
    version: v1
    adapter: postgres
    timeout_ms: 1000
    retry: 0
    required: false

  memory.approved_search:
    version: v1
    adapter: postgres_pgvector
    timeout_ms: 1000
    retry: 0
    required: false

  verification.citation_check:
    version: v1
    adapter: local
    timeout_ms: 1000
    retry: 0
    required: true

  verification.faithfulness_check:
    version: v1
    adapter: local
    timeout_ms: 3000
    retry: 0
    required: true
