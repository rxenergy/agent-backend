# v2 §8.5 — Tool Registry.
# Each tool is invoked via ToolExecutor. Adapter selection (which concrete class
# implements a tool name) is decided in backend/app/config/profiles.py, in the
# build_runtime() branch on settings.retriever_backend. This file defines only
# the execution policy — timeout_ms / retry / required — and the registry
# loader does NOT perform variable interpolation.

tools:
  retriever.search:
    version: v1
    adapter: env:RETRIEVER_BACKEND   # opensearch | local — wired in profiles.py
    timeout_ms: 5000
    retry: 1
    required: true

  # v3.1 Node 5 — reranker. 1차 검색(hybrid) 후보 풀을 재정렬해 RRF 융합을 대체한다.
  # required:false — 실패/미배선 시 dispatcher 가 1차 검색 순서로 graceful degrade
  # (rerank 점수 부재 → Node 6 G2 semantic 0.0). adapter 구현은 profiles.py 가
  # retriever_backend 로 선택: opensearch → SparseRerankerTool(SPLADE sparse 모델
  # 기반, 이미 로드된 Fermi encoder 재사용), local → LocalRerankerTool(lexical fake).
  retriever.rerank:
    version: v1
    adapter: local
    timeout_ms: 3000
    retry: 0
    required: false

  document.resolve_citation:
    version: v1
    adapter: env:RETRIEVER_BACKEND   # opensearch | local — wired in profiles.py
    timeout_ms: 2000
    retry: 0
    required: true

  # agentic_finder Finder Agent 도구(설계 finder §3). 검색 어댑터(retriever.search)
  # 재사용 + Reranker 어댑터 내부 정렬(RRF 대체). adapter 라벨은 span 명에만 쓰이며
  # 구체 클래스(RetrievalSearchTool=retriever+reranker)는 profiles.py 가 결정한다.
  # required:false — Finder *루프* 도구다. required:true 는 결정론 파이프라인 의미
  # ("턴 실패")라 LLM 이 컨트롤러인 agentic 루프와 안 맞는다. 실패 시 ToolExecutor 가
  # 예외 대신 failed 결과를 돌려주고, 루프가 그것을 tool_result(is_error)로 LLM 에
  # 되먹여 LLM 이 반응(다른 질의로 재검색 / submit_verdict(sufficient=False))하게
  # 한다(llm_tool_calling §9). v3.1 retriever.search(결정론 경로)는 required:true 유지.
  retrieval.search:
    version: v1
    adapter: reranked
    timeout_ms: 6000   # 내부 검색(5s) + reranker 여유.
    retry: 1
    required: false

  # retrieval.scope — 검색 범위 파라미터(결정론, CorpusMap.resolve_scope 차용).
  # required:false — 범위 *보강*용(실패해도 전 코퍼스 검색으로 진행 가능).
  retrieval.scope:
    version: v1
    adapter: corpus_map
    timeout_ms: 1000
    retry: 0
    required: false

  # terminology.canonicalize — 도메인 용어 정규화(용어집 ISO 25964 결정론 lookup).
  # N1.5 conductor-invoked(보장 실행) — retrieval.normalize(LLM 재량) 대체. surface/uf
  # → preferred + 정의를 컨텍스트에 병기(검색 질의 불변). 보강용 required:false.
  # 검색범위 확장(terminology.expand, 시소러스)은 Finder recover 전용으로 P3 추가.
  terminology.canonicalize:
    version: v1
    adapter: vocab
    timeout_ms: 1000
    retry: 0
    required: false

  # terminology.expand — 검색범위 확장(시소러스 ISO 25964 결정론 lookup). Finder-LLM-
  # invoked, **recover 전용**(첫 검색 후 searched_once 코드 게이트). UF/NT 기본, RT opt-in.
  # 보강용 required:false(루프 도구 — 실패는 is_error 로 LLM 되먹임).
  terminology.expand:
    version: v1
    adapter: vocab
    timeout_ms: 1000
    retry: 0
    required: false

  # submit_verdict — Finder 종료/충분성 판정 캡처(no-op). 인자=verdict.
  submit_verdict:
    version: v1
    adapter: local
    timeout_ms: 1000
    retry: 0
    required: false

  # confidence.scope — react_minimal_v1 모델 주도 scope 자기진단(결정론 coverage 계산).
  # CorpusMap(코퍼스 매칭) + 용어집(용어 coverage)을 합쳐 in-scope/unknown-term 신호를
  # 노출한다. 게이트 아님 — 모델이 신호를 보고 submit_response 로 scope 를 *표현*한다.
  # 보강용 required:false(루프 도구).
  confidence.scope:
    version: v1
    adapter: scope_coverage
    timeout_ms: 1000
    retry: 0
    required: false

  # submit_response — react_minimal_v1 ReAct 루프 종료 신호 캡처(no-op).
  # 인자=outcome(answer|out_of_scope|clarification|insufficient_evidence)+reason.
  submit_response:
    version: v1
    adapter: local
    timeout_ms: 1000
    retry: 0
    required: false

  # v3.1 P1 Section auto-merge / P2 다홉 — 한 Section 형제 문단 메타 표적 fetch.
  # required:false — 컨텍스트 *보강*용이라 실패해도 답변을 막지 않는다(leaf 로 진행).
  document.fetch_section:
    version: v1
    adapter: env:RETRIEVER_BACKEND   # opensearch | local — wired in profiles.py
    timeout_ms: 3000
    retry: 0
    required: false

  memory.session_load:
    version: v1
    adapter: postgres
    timeout_ms: 1000
    retry: 0
    required: false

  memory.session_update:
    version: v1
    adapter: postgres
    timeout_ms: 1000
    retry: 0
    required: false

  memory.approved_search:
    version: v1
    adapter: postgres_pgvector
    timeout_ms: 1000
    retry: 0
    required: false

  verification.citation_check:
    version: v1
    adapter: local
    timeout_ms: 1000
    retry: 0
    required: true

  verification.faithfulness_check:
    version: v1
    adapter: local
    timeout_ms: 3000
    retry: 0
    required: true
