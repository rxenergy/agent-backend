# Agent variant capability registry (ADR-0006).
#
# Source of truth for variant↔llm compatibility, required tools, and
# capability tags. Code MUST NOT hard-code these — `api/openai_compat.py`,
# `config/profiles.py`, and the future `VariantRegistry` (ADR-0004) all
# read from here through `VariantSpecRegistry.from_yaml(...)`.
#
# Schema: backend/app/domain/agents.py :: VariantSpec
#
# compatible_llms:
#   - ["*"]            → pool-wide (all llms configured in `LLM_POOL`)
#   - [id1, id2, ...]  → explicit allow-list against the llm pool ids
#
# required_tools entries MUST exist in tools/registry.yaml when the variant
# is enabled. `artifact.write_event` is intentionally absent — artifact
# persistence is handled by EventRecorder → EventSinkPort (spec v2 §8.2).

variants:

  # spec_driven_v1 — 검색 앞단 두 모델 노드(N1 Define Spec → N2 Query Formulation)를 둔
  # 선형 검색 Agent(ReAct·결정론 워크플로우 둘 다 최소화). 설계:
  # docs/plans/spec_driven_agent.design.v1.md. N1/N2 는 application instantiator(utility
  # LLM + json_schema, registry 도구 아님), N3 만 retrieval.search 도구. 명시적 참조 우선
  # (리터럴 키워드 → BM25 lexical, collection boost). 분류기·scenario·메모리 없음(단일턴).
  # v1 은 coverage 재검색·검증 미수행(stub). 근거 0건이면 gap-answer(거부 아님).
  spec_driven_v1:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, stateless, keyword_fidelity]

  # spec_driven_v2 — spec_driven_v1 의 선형 4-노드 흐름을 상속하되 LLM 업무를 두 DGX
  # Spark vLLM 노드로 분할한다(Node1=요청 LLM: N1/N2/N3.5/N4, Node2=SECONDARY_LLM:
  # 슬롯 단위 1차 검색 결과 검증). 설계: docs/plans/spec_driven_agent.design.v2.md.
  # required_tools 는 retrieval.search 만 — retrieval.verify_slot(Node2)·retrieval.follow_up
  # 는 graceful skip(미배선 시 단일노드 degrade)이라 필수에서 제외한다(원칙 6).
  spec_driven_v2:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, stateless, keyword_fidelity, dual_node]
