# Agent variant capability registry (ADR-0006).
#
# Source of truth for variant↔llm compatibility, required tools, and
# capability tags. Code MUST NOT hard-code these — `api/openai_compat.py`,
# `config/profiles.py`, and the future `VariantRegistry` (ADR-0004) all
# read from here through `VariantSpecRegistry.from_yaml(...)`.
#
# Schema: backend/app/domain/agents.py :: VariantSpec
#
# compatible_llms:
#   - ["*"]            → pool-wide (all llms configured in `LLM_POOL`)
#   - [id1, id2, ...]  → explicit allow-list against the llm pool ids
#
# required_tools entries MUST exist in tools/registry.yaml when the variant
# is enabled. `artifact.write_event` is intentionally absent — artifact
# persistence is handled by EventRecorder → EventSinkPort (spec v2 §8.2).

variants:

  # composer — N0~N3.5(검색 앞단 두 모델 노드 + 검색·follow-up)를 수행하고 N4 Generation
  # 만 슬롯 단위 파이프라인(슬롯별 순차 생성 + 슬롯 groundedness 게이트 + 최종 종합)으로
  # 구성한 variant. 설계:
  # docs/plans/spec_driven_slotwise_generation.design.v1.md. 검색·도구·세션·재현은 동일
  # (retrieval.search). 슬롯 CONTEXT 서브셋으로 1024 local-window 한계를 완화하고, 외부
  # 슬롯 병렬검색과 검색-생성 파이프라인으로 지연을 단축(후속 연동).
  composer:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, stateless]

  # composer 다중 페르소나 — composer 와 동형이나 검색 목적·답 척추가 다른 사용자 역할
  # (심사자/설계자/운영자)을 *variant 로 분리* 한다. 설계:
  # docs/plans/composer_persona_framework.design.v1.md. 선택은 AGENT_VARIANT 결정론(런타임
  # 추론 없음 — drift·오추론 차단). 동일 ComposerRunner + 동일 프롬프트 source 를 공유하고,
  # 차이는 바인딩된 Persona(spine_facets·collection_priority·register)+persona profile
  # fragment 로만 낸다. required_tools/compatible_llms 는 composer 와 동형. 단계 A 는 바인딩·
  # 등록만(동작 net-neutral); persona 소비는 단계 B~D.
  composer_reviewer:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, stateless, persona]

  composer_designer:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, stateless, persona]

  composer_operator:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, stateless, persona]

  # composer_pipelined — composer 의 슬롯 단위 생성(즉시 토큰 스트리밍)과 슬롯별 검색-검증
  # 파이프라인(Node2 = SECONDARY_LLM 검증)을 결합해 *배리어를 제거* 한 variant. 설계:
  # docs/plans/spec_driven_slot_pipeline_streaming.design.v1.md. N2 직후 슬롯별 검색-검증
  # future 를 즉시 발사(SlotSearchHandle)하고, 생성 루프가 슬롯 i 직전 그 future 만 await
  # 해 먼저 준비된 슬롯을 다른 슬롯 대기 없이 스트리밍한다(검색-생성 겹침으로 지연 단축).
  # cite-N 은 슬롯별 sub-pack 기준(slot-local) → 전체 청크 확정 불요(완전 배리어 제거).
  # required_tools 는 retrieval.search 만 — verify_slot/follow_up 은 미배선 시 단일노드
  # degrade(원칙 6, v2 동형).
  composer_pipelined:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, pipelined, dual_node, stateless]

  # composer_pipelined 다중 페르소나 — composer_pipelined 와 동형이나 검색 목적·답 척추가
  # 다른 사용자 역할(심사자/설계자/운영자)을 variant 로 분리(composer_persona_framework.
  # design.v1). 선택은 AGENT_VARIANT 결정론. 동일 ComposerPipelinedRunner + 동일 프롬프트
  # source 공유, 차이는 바인딩된 Persona + persona profile fragment 로만. composer 페르소나와
  # 동일 fragment(persona/{id}_v1.md) 재사용. required_tools/compatible_llms 는 pipelined 동형.
  composer_pipelined_reviewer:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, pipelined, dual_node, stateless, persona]

  composer_pipelined_designer:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, pipelined, dual_node, stateless, persona]

  composer_pipelined_operator:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, slotwise, composition, pipelined, dual_node, stateless, persona]
