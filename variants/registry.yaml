# Agent variant capability registry (ADR-0006).
#
# Source of truth for variant↔llm compatibility, required tools, and
# capability tags. Code MUST NOT hard-code these — `api/openai_compat.py`,
# `config/profiles.py`, and the future `VariantRegistry` (ADR-0004) all
# read from here through `VariantSpecRegistry.from_yaml(...)`.
#
# Schema: backend/app/domain/agents.py :: VariantSpec
#
# compatible_llms:
#   - ["*"]            → pool-wide (all llms configured in `LLM_POOL`)
#   - [id1, id2, ...]  → explicit allow-list against the llm pool ids
#
# required_tools entries MUST exist in tools/registry.yaml when the variant
# is enabled. `artifact.write_event` is intentionally absent — artifact
# persistence is handled by EventRecorder → EventSinkPort (spec v2 §8.2).

variants:

  fake_echo_v0:
    compatible_llms: [fake-echo]
    required_tools: []
    required_scenarios: []
    capability_tags: [smoke, p0]

  # v3.1 Hierarchical Corrective Workflow. The multi-strategy / claim-verification
  # tools (search_bm25, …, verification.claim_verify) are added in later PRs as
  # those nodes graduate from stub. compatible_llms stays pool-wide so the
  # fake-echo unit path works.
  hierarchical_corrective_v3_1:
    compatible_llms: ["*"]
    # citation_check / faithfulness_check 는 의도적으로 제외 — Node 15 claim
    # verifier 가 citation resolution 을 자체 set-lookup 으로 수행하고 faithfulness
    # 는 per-claim entailment 로 대체(retired). document.resolve_citation 은
    # resolvable id 산출에 여전히 사용.
    required_tools:
      - retriever.search
      - document.resolve_citation
      - memory.session_load
      - memory.session_update
      - memory.approved_search
    required_scenarios: [O1, O2, O3, O4]
    capability_tags: [hierarchical, corrective, claim_level_verify, retrieval, verification, memory]

  # agentic_finder_v4 — 3-Phase Intake→Retrieval→Generation.
  # 용어 정규화는 N1.5 terminology.canonicalize(conductor-invoked, 용어집 lookup)로
  # 상향(retrieval.normalize 대체). N3 Finder Agent 의 tool-calling 루프는
  # retrieval.scope/search + submit_verdict 를 ToolExecutor 로 invoke 한다(도구 set 은
  # registry 고정, "어느 도구를 언제"만 Finder LLM — 원칙 #2 의 국소 완화). retrieval
  # 검증은 Finder LLM 단독(RRF·결정론 게이트 제거)이라 verification.* 는 제외. 검색범위
  # 확장 terminology.expand(recover 전용)은 P3. Multi-Hop(N4)은 stub. compatible_llms
  # 는 pool-wide(fake 단위 경로 동작; 실 tool-calling 은 Gemma vLLM).
  agentic_finder_v4:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
      - retrieval.scope
      - terminology.canonicalize
      - terminology.expand
      - submit_verdict
      - memory.session_load
      - memory.session_update
      - memory.approved_search
    required_scenarios: [O1, O2, O3, O4]
    capability_tags: [agentic, finder, tool_calling, retrieval, memory]

  # react_minimal_v1 — 최소 2-Phase ReAct(Retrieval 루프 → Generation). 분류기·
  # query_translate·memory·O×D resolver 없이 모델 추론이 워크플로우를 주도하는
  # baseline(docs/plans/react_minimal_workflow.v1). 라우팅은 모델 주도(submit_response
  # outcome → RefusalReason), scope 는 confidence.scope 로 노출. 생성 후 검증은 관측
  # 전용(D1, generation-verification coupling). required_scenarios 비어 있음(분류기
  # 없음 → O×D 미요구). required_tools 비어있지 않아 풀 tool 스택을 트리거한다.
  react_minimal_v1:
    compatible_llms: ["*"]
    required_tools:
      - confidence.scope
      - terminology.canonicalize
      - terminology.expand
      - retrieval.scope
      - retrieval.search
      - submit_response
      - verification.citation_check
      - verification.faithfulness_check
    required_scenarios: []
    capability_tags: [react, agentic, stateless, tool_calling, retrieval]

  # react_echo_v1 — react_minimal_v1 의 도구-최소(echo) 변형. Phase 1 ReAct 루프 도구를
  # retrieval.search + submit_response 로 좁히고(scope/정규화/확장 도구 제거) 검색 질의
  # 작성을 모델 추론에 맡긴다(키워드-보존형 react_retrieval_echo_v1 프롬프트). 루프
  # mechanics·생성·검증 harness 는 react_minimal_v1 과 공유(실험 변수=도구셋+검색 프롬프트
  # 만). required_tools 가 루프 도구 2개 + 생성 후 관측 검증 2개 → 풀 tool 스택 트리거.
  react_echo_v1:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
      - submit_response
      - verification.citation_check
      - verification.faithfulness_check
    required_scenarios: []
    capability_tags: [react, agentic, stateless, tool_calling, retrieval, keyword_fidelity]

  # spec_driven_v1 — 검색 앞단 두 모델 노드(N1 Define Spec → N2 Query Formulation)를 둔
  # 선형 검색 Agent(ReAct·결정론 워크플로우 둘 다 최소화). 설계:
  # docs/plans/spec_driven_agent.design.v1.md. N1/N2 는 application instantiator(utility
  # LLM + json_schema, registry 도구 아님), N3 만 retrieval.search 도구. 명시적 참조 우선
  # (리터럴 키워드 → BM25 lexical, collection boost). 분류기·scenario·메모리 없음(단일턴).
  # v1 은 coverage 재검색·검증 미수행(stub). 근거 0건이면 gap-answer(거부 아님).
  spec_driven_v1:
    compatible_llms: ["*"]
    required_tools:
      - retrieval.search
    required_scenarios: []
    capability_tags: [spec_driven, retrieval, stateless, keyword_fidelity]
