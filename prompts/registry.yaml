# Prompt registry v3 Рђћ 4x3 Scenario matrix (O ├Ќ D).
#
# Depth axis (per docs/agent-protocol-prompt.doc ┬Д3):
#   D1 Overview / D2 Technical / D3 Formal
#
# Schema:
#   prompt_profiles.<profile_id>:
#     profile_version: <semver-ish tag pinning the whole composition>
#     scenario_object: O1|O2|O3|O4
#     scenario_depth:  D1|D2|D3
#     fragments:
#       system: { path, version, sha256 }   # mandatory
#       object: { path, version, sha256 }   # mandatory
#       depth:  { path, version, sha256 }   # mandatory
#       cell:   { path, version, sha256 }   # optional (null when generic O+D)
#     output_schema:   { path, version, sha256 }
#     model_options:   {temperature, max_tokens, ...}
#
# Loader (`backend/app/application/prompting/local_source.py`) recomputes sha256
# for each fragment file on load and fails fast on mismatch. Bumping a fragment
# without updating this registry is therefore impossible.
#
# system fragment v3 -> v4 (2026-05-29):
#   - [ВДѕВЮў вїђВЃЂв│ё В▓ўвдг Рђћ OВХЋ] вИћвАЮ ВаюЖ▒░ Рђћ object/ fragment(ьЋёВѕў)Ж░ђ ьЎюВё▒ OВЮў ВХЋ
#     focusвЦ╝ ВЮ┤в»И вІ┤Вю╝в»ђвАю ВцЉв│х. ВєїьўЋвфевЇИ ьєаьЂ░ ВаѕЖ░љ + в╣ёьЎюВё▒ O ВДђВІю ВаюЖ▒░.
#   - [Citation Format] ВЋЋВХЋ(ЖиюВ╣Ў┬иВўѕВІю в│┤ВА┤). cite-N ЖиюВ╣ЎВЮђ systemВЌљ ВюаВДђ Рђћ
#     v2(sequential_tool_routed)віћ citation_contract_v1.md вЦ╝ ВБ╝ВъЁьЋўВДђ ВЋіВю╝в»ђвАю
#     system ВЮ┤ ВюаВЮ╝ьЋю ВЮИВџЕ ВДђВІюВ▓ўвІц(v3.1 вДї contract ВХћЖ░ђ ВБ╝ВъЁ).
#   - [ВХюваЦ ВЏљВ╣Ў Рђћ ВѓгВџЕВъљ ВЮўвЈё Вџ░Вёа] ВХћЖ░ђ: вІхв│ђВЮђ ВѓгВџЕВъљ ВДѕВЮў ВЮўвЈёВЌљ ВДЂВаЉ
#     вІхьЋўвіћ Ж▓ЃВЮ┤ 1ВѕюВюёВЮ┤вЕ░, OBJECT/DEPTH/CELL ьўЋВІЮВЮђ ВЮўвЈёвЦ╝ ЖхгВА░ьЎћьЋўвіћ
#     Ж░ђВЮ┤вЊю(ВЮўвЈёВЎђ ВХЕвЈї ВІю ВЮўвЈё Вџ░Вёа). вІе [вІхв│ђ В▓аьЋЎ]┬и[ВъљвБї ВХЕвХёвЈё]┬и
#     [Citation Format] ВЮђ вХѕв│ђ. Рєњ Ж▓йВДЂвљю cell ьЁюьћївд┐ВЮ┤ ВѓгВџЕВъљ ВЮўвЈёвЦ╝ Ж░ђвЉљВДђ
#     ВЋіЖ▓ї ьЋўвљў grounding ВЮђ ВЎёьЎћьЋўВДђ ВЋіВЮї. (v4 віћ в»ИВ╗цв░ІВЮ┤вЮ╝ v5 bump ВЌєВЮ┤
#     in-place Ж░▒ВІа, sha вДї ВъгЖ│ёВѓ░.)
#
# system fragment v4 in-place (2026-05-29, sha 083d18cРђд):
#   - [ВХюваЦ ВЏљВ╣Ў Рђћ ВѓгВџЕВъљ ВЮўвЈё Вџ░Вёа] Рєњ [вІхв│ђ ЖхгВА░ Рђћ ьЋГВЃЂ ВаЂВџЕвљўвіћ ЖИ░в│И Ж│еЖ▓Е]
#     + [ВХюваЦ ВЏљВ╣Ў Рђћ ВѓгВџЕВъљ ВЮўвЈёВЎђ ьўЋВІЮВЮў Ж┤ђЖ│ё] вАю ЖхљВ▓┤. ВдЮВЃЂ: вфевЇИВЮ┤ вІхв│ђВЮё
#     ЖхгВА░ьЎћьЋўВДђ ВЋіЖ│а Вѓ░вгИВю╝вАю вГЅвџ▒ЖиИвд╝. ВЏљВЮИ ВДёвІе: ЖИ░ВА┤ "ВЮўвЈё Вџ░Вёа" вгИЖхгЖ░ђ
#     ьўЋВІЮВЮё "Ж░ђВЮ┤вЊюВЮ╝ в┐љ"Вю╝вАю ВЋйьЎћВІюВ╝ю ЖхгВА░ ВъљВ▓┤вЦ╝ в▓ёвдгЖ▓ї ВюавЈё.
#   - 4вХђ Ж│еЖ▓Е(Ж▓░вАа Рєњ Жи╝Ж▒░ в│ИвгИ Рєњ ВЏљвгИ ВЮИВџЕ Рєњ ВІавб░вЈё)ВЮё depth-agnostic вХѕв│ђ
#     ЖиюВ╣ЎВю╝вАю system ВЌљ Ві╣Ж▓Е. в│ИвгИ ьўЋьЃювіћ DEPTH Ж░ђ Ж▓░ВаЋ(D1 ВДЉЖ│ё/D2 ВЮИЖ│╝ВѓгВіг/
#     D3 ВЏљвгИ) Рђћ Ж│еЖ▓Е=вХѕв│ђ, в│ИвгИ=depth-variant вХёвдг. d1/d2/d3 fragment ВЮў ЖИ░ВА┤
#     ьўЋВІЮЖ│╝ ВЮ╝В╣ўьЋўв»ђвАю ВцЉв│хВЮ┤ ВЋёвІѕвЮ╝ Ж│хьєх вХѕв│ђВІЮ ВХћВХю.
#   - "ВЮўвЈё Вџ░Вёа" ВъгВаЋВЮў: ВЮўвЈёвіћ *Ж░Ђ вХђВЮў вѓ┤ВџЕ*ВЮё Ж▓░ВаЋьЋўВДђ *ЖхгВА░ ВѓгВџЕ ВЌгвХђ*вЦ╝
#     Ж▓░ВаЋьЋўВДђ ВЋіВЮї. в╣ѕ ьЋГвфЕ ВќхВДђ ВЃЮВё▒ ЖИѕВДђ(anti-padding)віћ ВюаВДђ.
#
# system fragment v4 Рєњ v5 (2026-06-04, sha 083d18cРђд Рєњ 24f1ca9Рђд):
#   - [в▓ћВюё Ж│ёВЋй Рђћ SCOPE CONTRACT] вИћвАЮ ВХћЖ░ђ([Жи╝Ж▒░ ВъљвБї]ВЎђ [вІхв│ђ В▓аьЋЎ] ВѓгВЮ┤).
#     In-Scope(вЈёвЕћВЮИ ьЋхВІг┬иЖ▓ђВЃЅ Жи╝Ж▒░) / Foundational(ЖИ░В┤ѕ Ж░ювЁљВЮђ вІхьЋўвљў ВйћьЇ╝Віц
#     в░ќВЮ┤вЕ┤ "ВЮ╝в░ў ВДђВІЮ┬иЖ▓ђВдЮ ВЌєВЮї" вЮ╝в▓е+ВЮИВџЕ ЖИѕВДђ; вЁИьўЋ┬иВА░ьЋГ *ВѓгВІц*ВЮђ ВЮ╝в░ўВДђВІЮ
#     Вю╝вАю вЕћВџ░ВДђ ВЋіВЮї) / Out-of-Role(ВъАвІ┤┬иьЃђ вЈёвЕћВЮИ┬иЖХїВюё В░ИВ╣Г┬ивѓаВА░віћ Ж▒░вХђ).
#     Ж│ёьџЇ: query_scope_and_intent_taxonomy.plan.v1 W-P1(grounding-first Fork A).
#   - v4 віћ ВЮ┤в»И В╗цв░І(083d18c)вљўВќ┤ Ж│╝Ж▒░ InteractionEvent Ж░ђ ЖиИ sha вЦ╝ ЖИ░вАЮ Рєњ
#     in-place ЖИѕВДђ(ВъгьўёВё▒┬иВЏљВ╣Ў 5). v5 ВІаЖию ьїїВЮ╝ bump, v4 в│┤ВА┤(Ж│╝Ж▒░ ВЮ┤в▓цьіИ
#     ВъгьўёВџЕ). Ваё 12 ьћёвАюьїїВЮ╝ system path/version/sha Рєњ v5.
#
# system fragment v5 Рєњ v6 + object v1 Рєњ v2 + answer_spec v1 Рєњ v2 (2026-06-08) Рђћ
# prompt_regulatory_authority_expressiveness.plan.v1 (W-A/W-B/W-C/W-D/W-F):
#   вфЕьЉю Рђћ вІхв│ђВЮ┤ ВЮИВџЕ Жи╝Ж▒░ВЮў *Жиюв▓ћВаЂ вг┤Ж▓ї*(ЖхгВєЇ ВџћЖ▒┤ 10CFR/GDC vs ЖХїЖ│а┬ив╣ёЖхгВєЇ
#   RG/SRP/DSRS vs ВІгВѓгЖИ░вАЮ SER/RAI vs ВІаВ▓ГВъљ ВБ╝ВъЦ FSAR vs ВЮИВдЮ ВёавАђ)вЦ╝ ЖхгвХёьЋ┤
#   ьЉюьўёьЋўЖ▓ї ьЋювІц. ЖХїВюёвіћ doc_type/collection ьїїВЃЮ(Ж▓░ВаЋвАа, citation_format.
#   normative_weight)ВЮ┤вЕ░ вХёвЦў ВХЋ ВІаВёц ВЋёвІў([[model_over_rule]]). ВЁђ вДцьіИвдГВіц
#   (12=O├ЌD)┬иanswer_schema вХѕв│ђ.
#   - system v6: [Жи╝Ж▒░ ВъљвБї] Рєњ вгИВёю ВДђьўЋвЈё+6 Жиюв▓ћвг┤Ж▓ї ВѓгвІцвдг(W-A); [вІхв│ђ В▓аьЋЎ]
#     Ваю3ВЏљВ╣Ў "Жиюв▓ћВаЂ вг┤Ж▓ї в│┤ВА┤"(W-F Рђћ ЖХїВюё ВЮИьћїваѕВЮ┤ВЁў=ьЎўЖ░Ђ); [Citation Format]
#     вг┤Ж▓ї ьЃюЖиИ в│┤ВА┤ ЖиюВ╣Ў(W-D Рђћ Ж▓░ВаЋвАа ьЃюЖиИвіћ citation_format ВЮ┤ ВХюВ▓ўВЌљ вХђВ░Е).
#   - object v2(o1/o2/o3/o4): Ж░Ђ Ж░ЮВ▓┤ВЌљ вг┤Ж▓ї ЖхгвХё ВДђВІю(W-B). o2 = ЖхгВєЇ/ЖХїЖ│а
#     вХёвдг(RG вЦ╝ "ВџћЖхг"вАю ВЊ░ВДђ ВЋіВЮї), o1 = ВБ╝ВъЦ/ВёавАђ вХёвдг, o3 = ВІгВѓгЖИ░вАЮ ВЮ╝в░ўьЎћ
#     ЖИѕВДђ, o4 = ВХЕВА▒ ВѓгВіг ВќЉвЂЮ вг┤Ж▓ї вХђВ░Е.
#   - answer_spec v2: prior ВігвА»ВЌљ normative_status┬иauthority_basis ВХћЖ░ђ(W-C Рђћ
#     output_schema вг┤в│ђЖ▓й, ВігвА»вфЁ ВъљВюа). Finder Ж░ђ ЖХїВюё Ж░ђвЦ┤віћ Жи╝Ж▒░вЦ╝ Ж▓ђВЃЅ ВџћЖхгвАю.
#   - v5/v1 ВЮђ ВЮ┤в»И В╗цв░І Рєњ in-place ЖИѕВДђ(ВъгьўёВё▒). ВІаЖию ьїїВЮ╝ bump, Жхгв▓ёВаё в│┤ВА┤
#     (Ж│╝Ж▒░ ВЮ┤в▓цьіИ ВъгьўёВџЕ). Ваё 12 ьћёвАюьїїВЮ╝ systemРєњv6┬иobjectРєњv2, answer_specРєњv2.
#
# cell fragment ВІаВёц (2026-06-04) Рђћ classification_prompt_goldset_update.plan.v1 W-F:
#   - o2_d2_regulation_technical_v1: O2├ЌD2 Ж│хв░▒ ВЁђ. D2 ВѓгВігВЮў 2вІеЖ│ё "вЁИьўЋ В▓ўвдг"вЦ╝
#     ВёаьЃЮьЎћ(вЁИьўЋ в»ИВќИЖИЅ ВІю ВЃЮвъх Рђћ в╣ѕ вІеЖ│ё ьіИвъЕ ьџїьћ╝).
#   - o3_d3_rai_formal_v1: O3├ЌD3 Ж│хв░▒ ВЁђ. NRC ВДѕВЮўвгИ/вЁИьўЋ ВЮЉвІх вХёвдг, ВЏљвгИ в│┤ВА┤.
#   - o4_d3_relation_formal_v1: O4├ЌD3 Ж│хв░▒ ВЁђ. ВЮИВџЕьЋўвіћ Вфй(FSAR ВюёВ╣ў)РєћВЮИВџЕвљўвіћ
#     ЖиюВаю ID ВќЉВфй ВІЮв│ё, ВЮИВџЕ вгИЖхг ВЏљвгИ в│┤ВА┤.
#
# cell fragment вДцьіИвдГВіц ВЎёВё▒ (2026-06-04) Рђћ вѓеВЮђ 5 в╣ёьі╣ьЎћ ВЁђ В▒ёВЏђ(12/12 ьі╣ьЎћ):
#   - o1_d1_vendor_overview_v1: вЁИьўЋ ьўёьЎЕ + вІеВЮ╝ вгИВёю ЖхгВА░ ВЌ┤Ж▒░(FSAR Part/Tier).
#   - o1_d3_vendor_formal_v1: вЁИьўЋВЮ┤ ВёаВќИьЋю Ж│хВІЮ ЖИ░Вцђ ВЏљвгИ(ЖиюВаю ВЏљвгИЖ│╝ ЖхгвХё).
#   - o2_d1_regulation_overview_v1: ЖиюВаюЖх░ ВБ╝Ваюв▓ћВюё┬иВА░ьЋГ вфЕвАЮ Ж░юЖ┤ђ.
#   - o3_d1_rai_overview_v1: RAI/Ж░љВѓг вХёьЈг┬иьїеьё┤ ВДЉЖ│ё.
#   - o4_d1_relation_overview_v1: вгИВёю Ж┤ђЖ│ё вХёьЈг(ВЮИВџЕ ЖиюВаю вХёьЈг┬иЖ┤ђЖ│ёВюаьўЋв│ё).
#   ВЮ┤Ваю 12 (O,D) ВЁђ вфевЉљ cell вЇИьЃђ в│┤Вюа Рђћ generic ьЋЕВё▒ ВъћВЌг ВЌєВЮї.
#
# abstention ьїљВаЋ ВБ╝В▓┤(ВёцЖ│ё вЕћвфе, ьћёвАгьћёьіИ в│ИвгИ ВЋёвІў): "Жи╝Ж▒░ вХђВА▒ ВІю ВбЁвБї"віћ
# вІхв│ђВЮў *ВёюВѕа ьўЋВІЮ*ВЮ╝ в┐љ, В▒ёьЃЮ ВЌгвХђВЮў ВхюВбЁ *ьїљВаЋ*ВЮђ ВйћвЊюВЮў Ж▓░ВаЋвАа Ж▓їВЮ┤ьіИ
# (Ж▓ђВЃЅ вг┤Ж▓░Ж│╝ RETRIEVAL_NO_RESULT / Ж▓ђВдЮ ВІцьїе VERIFICATION_FAILED /
#  в╣ёьЎюВё▒ cell CLARIFICATION_REQUIRED)Ж░ђ ВѕўьќЅьЋювІц. Жи╝Ж▒░-ВъѕВЮїВЮ┤вѓў ВЮўв»ИВЃЂ
# Вќ┤ЖИІвѓю ВъћВЌг ВўцвЦўвіћ ВЎИвХђ Ж▓ђВдЮ(generation_verification_coupling L1.5/L2)ВЮ┤
# Ж┤ђвдгьЋўвЕ░ ьћёвАгьћёьіИвАю ВЎёВаёьъѕ ВаюЖ▒░вљўВДђвіћ ВЋівіћвІц. abstention ВЌ░ЖхгвЈё ьћёвАгьћёьіИ
# ВДђВІювДїВю╝вАювіћ abstention ВЮ┤ ВІавб░вљўВДђ ВЋіВЮїВЮё в│┤Ж│аьЋўв»ђвАю, ьїљВаЋ вХђвІ┤ВЮё system
# ьћёвАгьћёьіИВЌљ ВІБВДђ ВЋівіћвІц. (docs/references/prompt_design_reference.md ┬Д1.3)

