# Prompt registry v3 — 4x3 Scenario matrix (O × D).
#
# Depth axis (per docs/agent-protocol-prompt.doc §3):
#   D1 Overview / D2 Technical / D3 Formal
#
# Schema:
#   prompt_profiles.<profile_id>:
#     profile_version: <semver-ish tag pinning the whole composition>
#     scenario_object: O1|O2|O3|O4
#     scenario_depth:  D1|D2|D3
#     fragments:
#       system: { path, version, sha256 }   # mandatory
#       object: { path, version, sha256 }   # mandatory
#       depth:  { path, version, sha256 }   # mandatory
#       cell:   { path, version, sha256 }   # optional (null when generic O+D)
#     output_schema:   { path, version, sha256 }
#     model_options:   {temperature, max_tokens, ...}
#
# Loader (`backend/app/application/prompting/local_source.py`) recomputes sha256
# for each fragment file on load and fails fast on mismatch. Bumping a fragment
# without updating this registry is therefore impossible.
#
# system fragment v3 -> v4 (2026-05-29):
#   - [질의 대상별 처리 — O축] 블록 제거 — object/ fragment(필수)가 활성 O의 축
#     focus를 이미 담으므로 중복. 소형모델 토큰 절감 + 비활성 O 지시 제거.
#   - [Citation Format] 압축(규칙·예시 보존). cite-N 규칙은 system에 유지 —
#     v2(sequential_tool_routed)는 citation_contract_v1.md 를 주입하지 않으므로
#     system 이 유일한 인용 지시처다(v3.1 만 contract 추가 주입).
#   - [출력 원칙 — 사용자 의도 우선] 추가: 답변은 사용자 질의 의도에 직접
#     답하는 것이 1순위이며, OBJECT/DEPTH/CELL 형식은 의도를 구조화하는
#     가이드(의도와 충돌 시 의도 우선). 단 [답변 철학]·[자료 충분도]·
#     [Citation Format] 은 불변. → 경직된 cell 템플릿이 사용자 의도를 가두지
#     않게 하되 grounding 은 완화하지 않음. (v4 는 미커밋이라 v5 bump 없이
#     in-place 갱신, sha 만 재계산.)
#
# system fragment v4 in-place (2026-05-29, sha 083d18c…):
#   - [출력 원칙 — 사용자 의도 우선] → [답변 구조 — 항상 적용되는 기본 골격]
#     + [출력 원칙 — 사용자 의도와 형식의 관계] 로 교체. 증상: 모델이 답변을
#     구조화하지 않고 산문으로 뭉뚱그림. 원인 진단: 기존 "의도 우선" 문구가
#     형식을 "가이드일 뿐"으로 약화시켜 구조 자체를 버리게 유도.
#   - 4부 골격(결론 → 근거 본문 → 원문 인용 → 신뢰도)을 depth-agnostic 불변
#     규칙으로 system 에 승격. 본문 형태는 DEPTH 가 결정(D1 집계/D2 인과사슬/
#     D3 원문) — 골격=불변, 본문=depth-variant 분리. d1/d2/d3 fragment 의 기존
#     형식과 일치하므로 중복이 아니라 공통 불변식 추출.
#   - "의도 우선" 재정의: 의도는 *각 부의 내용*을 결정하지 *구조 사용 여부*를
#     결정하지 않음. 빈 항목 억지 생성 금지(anti-padding)는 유지.
#
# system fragment v4 → v5 (2026-06-04, sha 083d18c… → 24f1ca9…):
#   - [범위 계약 — SCOPE CONTRACT] 블록 추가([근거 자료]와 [답변 철학] 사이).
#     In-Scope(도메인 핵심·검색 근거) / Foundational(기초 개념은 답하되 코퍼스
#     밖이면 "일반 지식·검증 없음" 라벨+인용 금지; 노형·조항 *사실*은 일반지식
#     으로 메우지 않음) / Out-of-Role(잡담·타 도메인·권위 참칭·날조는 거부).
#     계획: query_scope_and_intent_taxonomy.plan.v1 W-P1(grounding-first Fork A).
#   - v4 는 이미 커밋(083d18c)되어 과거 InteractionEvent 가 그 sha 를 기록 →
#     in-place 금지(재현성·원칙 5). v5 신규 파일 bump, v4 보존(과거 이벤트
#     재현용). 전 12 프로파일 system path/version/sha → v5.
#
# system fragment v5 → v6 + object v1 → v2 + answer_spec v1 → v2 (2026-06-08) —
# prompt_regulatory_authority_expressiveness.plan.v1 (W-A/W-B/W-C/W-D/W-F):
#   목표 — 답변이 인용 근거의 *규범적 무게*(구속 요건 10CFR/GDC vs 권고·비구속
#   RG/SRP/DSRS vs 심사기록 SER/RAI vs 신청자 주장 FSAR vs 인증 선례)를 구분해
#   표현하게 한다. 권위는 doc_type/collection 파생(결정론, citation_format.
#   normative_weight)이며 분류 축 신설 아님([[model_over_rule]]). 셀 매트릭스
#   (12=O×D)·answer_schema 불변.
#   - system v6: [근거 자료] → 문서 지형도+6 규범무게 사다리(W-A); [답변 철학]
#     제3원칙 "규범적 무게 보존"(W-F — 권위 인플레이션=환각); [Citation Format]
#     무게 태그 보존 규칙(W-D — 결정론 태그는 citation_format 이 출처에 부착).
#   - object v2(o1/o2/o3/o4): 각 객체에 무게 구분 지시(W-B). o2 = 구속/권고
#     분리(RG 를 "요구"로 쓰지 않음), o1 = 주장/선례 분리, o3 = 심사기록 일반화
#     금지, o4 = 충족 사슬 양끝 무게 부착.
#   - answer_spec v2: prior 슬롯에 normative_status·authority_basis 추가(W-C —
#     output_schema 무변경, 슬롯명 자유). Finder 가 권위 가르는 근거를 검색 요구로.
#   - v5/v1 은 이미 커밋 → in-place 금지(재현성). 신규 파일 bump, 구버전 보존
#     (과거 이벤트 재현용). 전 12 프로파일 system→v6·object→v2, answer_spec→v2.
#
# cell fragment 신설 (2026-06-04) — classification_prompt_goldset_update.plan.v1 W-F:
#   - o2_d2_regulation_technical_v1: O2×D2 공백 셀. D2 사슬의 2단계 "노형 처리"를
#     선택화(노형 미언급 시 생략 — 빈 단계 트랩 회피).
#   - o3_d3_rai_formal_v1: O3×D3 공백 셀. NRC 질의문/노형 응답 분리, 원문 보존.
#   - o4_d3_relation_formal_v1: O4×D3 공백 셀. 인용하는 쪽(FSAR 위치)↔인용되는
#     규제 ID 양쪽 식별, 인용 문구 원문 보존.
#
# cell fragment 매트릭스 완성 (2026-06-04) — 남은 5 비특화 셀 채움(12/12 특화):
#   - o1_d1_vendor_overview_v1: 노형 현황 + 단일 문서 구조 열거(FSAR Part/Tier).
#   - o1_d3_vendor_formal_v1: 노형이 선언한 공식 기준 원문(규제 원문과 구분).
#   - o2_d1_regulation_overview_v1: 규제군 주제범위·조항 목록 개관.
#   - o3_d1_rai_overview_v1: RAI/감사 분포·패턴 집계.
#   - o4_d1_relation_overview_v1: 문서 관계 분포(인용 규제 분포·관계유형별).
#   이제 12 (O,D) 셀 모두 cell 델타 보유 — generic 합성 잔여 없음.
#
# abstention 판정 주체(설계 메모, 프롬프트 본문 아님): "근거 부족 시 종료"는
# 답변의 *서술 형식*일 뿐, 채택 여부의 최종 *판정*은 코드의 결정론 게이트
# (검색 무결과 RETRIEVAL_NO_RESULT / 검증 실패 VERIFICATION_FAILED /
#  비활성 cell CLARIFICATION_REQUIRED)가 수행한다. 근거-있음이나 의미상
# 어긋난 잔여 오류는 외부 검증(generation_verification_coupling L1.5/L2)이
# 관리하며 프롬프트로 완전히 제거되지는 않는다. abstention 연구도 프롬프트
# 지시만으로는 abstention 이 신뢰되지 않음을 보고하므로, 판정 부담을 system
# 프롬프트에 싣지 않는다. (docs/references/prompt_design_reference.md §1.3)

# Node 1 분류 프롬프트 (llm_classifier_intent_scope_registry.plan.v1).
#   답변 프롬프트(prompt_profiles)와 동일 registry 에서 sha 핀·버전 관리한다.
#   `ClassificationPromptSource`(backend/app/application/prompting/classification_source.py)
#   가 boot 시 fragment 바이트를 재해시해 declared sha 와 대조(무단 편집 차단,
#   prompt_profiles 와 동일 fail-fast 불변식). 분류기의 `classifier_policy_hash`
#   는 이 prompt fragment 의 sha 로 InteractionEvent 에 기록된다(원칙 5).
#   model_options 도 여기서 외부화 — 코드 인라인 상수 제거.
classification_prompts:
  classifier_v1:
    profile_version: v1
    prompt:        {path: classification/classifier_v1.md,                 version: v1, sha256: "fdb651e0c83cc76011656382b820a8b14567c87b04d76b69689076a9af6db243"}
    output_schema: {path: classification/schemas/classifier_output_v1.json, version: v1, sha256: "3d2507293f83d3285c8ebfd69fbc98333d67952ffa8c5e586224e9a59d609b1d"}
    model_options: {temperature: 0.0, max_tokens: 200}

# Node 3 정보 요구(information need) 프롬프트 (information_need_driven_retrieval.plan.v1).
#   분류 프롬프트와 동일 registry 에서 sha 핀·버전 관리한다. 코드 인라인 금지 —
#   `InformationNeedPromptSource`(backend/app/application/prompting/information_need_source.py)
#   가 boot 시 fragment 바이트를 재해시해 declared sha 와 대조(무단 편집 차단,
#   classification_prompts 와 동일 fail-fast 불변식). 산출물의 `policy_hash` 는
#   이 prompt fragment 의 sha 로 InteractionEvent 에 기록된다(원칙 5). output_schema
#   는 guided-decoding(json_schema grammar)에 쓰이며 model_options 도 외부화.
query_understanding_prompts:
  information_need_v1:
    profile_version: v1
    prompt:        {path: query_understanding/information_need_v1.md,            version: v1, sha256: "2cd9992528f424e81e874c28d35938047925cc9f4b12f335d865be3e45638f8f"}
    output_schema: {path: query_understanding/schemas/information_need_v1.json,  version: v1, sha256: "86c0788c2edd4bdcd01621cbb56ed2e1e80c702f9163b804c7ded7c13713b93d"}
    model_options: {temperature: 0.0, max_tokens: 400}

# agentic_finder N0 query_translate(질의 번역) 프롬프트 (agentic_finder_workflow.v1).
#   워크플로우 내부(분류·answer_spec·Finder 검색)는 영어 코퍼스를 대상으로 하므로
#   사용자 질의를 검색용 영어(query_en)로 번역하고 원 언어(source_language)를 식별한다.
#   분류/answer_spec 과 동일 registry sha 핀·fail-fast — `QueryTranslatePromptSource`
#   (backend/app/application/prompting/query_translate_source.py)가 boot 시 fragment
#   바이트를 재해시해 대조한다(무단 편집 차단, 원칙 5). policy_hash(번역 정책 핀)는
#   이 prompt fragment 의 sha. output_schema 는 guided-decoding(json_schema)에 쓰인다.
query_translate_prompts:
  query_translate_v1:
    profile_version: v1
    prompt:        {path: query_translate/query_translate_v1.md,            version: v1, sha256: "5f11a9c6053e31dc9232c22ad78b32ad270802892656cdd191d0453bd69cf4b4"}
    output_schema: {path: query_translate/schemas/query_translate_v1.json,  version: v1, sha256: "738290b9bc805dd6c562406d2fe82ff65cc4c5f252e7a891f25cf0f668205829"}
    model_options: {temperature: 0.0, max_tokens: 400}

# agentic_finder N2 answer_spec(답변 사양) 프롬프트 (agentic_finder_workflow.v1).
#   분류/정보요구 프롬프트와 동일 registry 에서 sha 핀·버전 관리한다. 코드 인라인
#   금지 — `AnswerSpecPromptSource`(backend/app/application/prompting/answer_spec_source.py)
#   가 boot 시 fragment 바이트를 재해시해 declared sha 와 대조(무단 편집 차단, 동일
#   fail-fast 불변식). 산출물의 `policy_hash`(= InteractionEvent answer_spec_hash 핀)
#   는 이 prompt fragment 의 sha. output_schema 는 guided-decoding(json_schema)에 쓰인다.
answer_spec_prompts:
  answer_spec_v1:
    profile_version: v1
    prompt:        {path: answer_spec/answer_spec_v2.md,            version: v2, sha256: "d9cc623a7a8db1d59b1927cfe7a27736f3e7187e3dd6679b4b096cd9a807defa"}
    output_schema: {path: answer_spec/schemas/answer_spec_v1.json,  version: v1, sha256: "d1ec8050a8d5375ca9f70f45e09b396a1c185f805d3bc43e8626238a1b33f059"}
    model_options: {temperature: 0.0, max_tokens: 400}

# agentic_finder N3 Finder Agent 시스템 프롬프트 (agentic_finder_workflow.v1 §3).
#   tool-calling 멀티턴 루프의 *정적* 시스템 지시(도구 사용 규약·종료 규칙). 동적
#   답변 사양/질의는 런타임에 덧붙는다. `FinderPromptSource` 가 boot 시 sha 검증
#   (동일 fail-fast). `finder_policy_hash`(= InteractionEvent 핀)는 이 본문 sha.
#   output_schema 없음 — 구조는 도구 호출(submit_verdict)이 강제한다(structured-by-construction).
finder_prompts:
  finder_v1:
    profile_version: v1
    prompt:        {path: finder/finder_v1.md, version: v1, sha256: "cf2bc04362e3ab85195daff4e830053381eac5ef38df7b7d97d52ee160c7628f"}
    model_options: {temperature: 0.0, max_tokens: 600}

