# Prompt registry v3 — 4x3 Scenario matrix (O × D).
#
# Depth axis (per docs/agent-protocol-prompt.doc §3):
#   D1 Overview / D2 Technical / D3 Formal
#
# Schema:
#   prompt_profiles.<profile_id>:
#     profile_version: <semver-ish tag pinning the whole composition>
#     scenario_object: O1|O2|O3|O4
#     scenario_depth:  D1|D2|D3
#     fragments:
#       system: { path, version, sha256 }   # mandatory
#       object: { path, version, sha256 }   # mandatory
#       depth:  { path, version, sha256 }   # mandatory
#       cell:   { path, version, sha256 }   # optional (null when generic O+D)
#     output_schema:   { path, version, sha256 }
#     model_options:   {temperature, max_tokens, ...}
#
# Loader (`backend/app/application/prompting/local_source.py`) recomputes sha256
# for each fragment file on load and fails fast on mismatch. Bumping a fragment
# without updating this registry is therefore impossible.
#
# system fragment v3 -> v4 (2026-05-29):
#   - [질의 대상별 처리 — O축] 블록 제거 — object/ fragment(필수)가 활성 O의 축
#     focus를 이미 담으므로 중복. 소형모델 토큰 절감 + 비활성 O 지시 제거.
#   - [Citation Format] 압축(규칙·예시 보존). cite-N 규칙은 system에 유지 —
#     v2(sequential_tool_routed)는 citation_contract_v1.md 를 주입하지 않으므로
#     system 이 유일한 인용 지시처다(v3.1 만 contract 추가 주입).
#   - [출력 원칙 — 사용자 의도 우선] 추가: 답변은 사용자 질의 의도에 직접
#     답하는 것이 1순위이며, OBJECT/DEPTH/CELL 형식은 의도를 구조화하는
#     가이드(의도와 충돌 시 의도 우선). 단 [답변 철학]·[자료 충분도]·
#     [Citation Format] 은 불변. → 경직된 cell 템플릿이 사용자 의도를 가두지
#     않게 하되 grounding 은 완화하지 않음. (v4 는 미커밋이라 v5 bump 없이
#     in-place 갱신, sha 만 재계산.)
#
# system fragment v4 in-place (2026-05-29, sha 083d18c…):
#   - [출력 원칙 — 사용자 의도 우선] → [답변 구조 — 항상 적용되는 기본 골격]
#     + [출력 원칙 — 사용자 의도와 형식의 관계] 로 교체. 증상: 모델이 답변을
#     구조화하지 않고 산문으로 뭉뚱그림. 원인 진단: 기존 "의도 우선" 문구가
#     형식을 "가이드일 뿐"으로 약화시켜 구조 자체를 버리게 유도.
#   - 4부 골격(결론 → 근거 본문 → 원문 인용 → 신뢰도)을 depth-agnostic 불변
#     규칙으로 system 에 승격. 본문 형태는 DEPTH 가 결정(D1 집계/D2 인과사슬/
#     D3 원문) — 골격=불변, 본문=depth-variant 분리. d1/d2/d3 fragment 의 기존
#     형식과 일치하므로 중복이 아니라 공통 불변식 추출.
#   - "의도 우선" 재정의: 의도는 *각 부의 내용*을 결정하지 *구조 사용 여부*를
#     결정하지 않음. 빈 항목 억지 생성 금지(anti-padding)는 유지.
#
# system fragment v4 → v5 (2026-06-04, sha 083d18c… → 24f1ca9…):
#   - [범위 계약 — SCOPE CONTRACT] 블록 추가([근거 자료]와 [답변 철학] 사이).
#     In-Scope(도메인 핵심·검색 근거) / Foundational(기초 개념은 답하되 코퍼스
#     밖이면 "일반 지식·검증 없음" 라벨+인용 금지; 노형·조항 *사실*은 일반지식
#     으로 메우지 않음) / Out-of-Role(잡담·타 도메인·권위 참칭·날조는 거부).
#     계획: query_scope_and_intent_taxonomy.plan.v1 W-P1(grounding-first Fork A).
#   - v4 는 이미 커밋(083d18c)되어 과거 InteractionEvent 가 그 sha 를 기록 →
#     in-place 금지(재현성·원칙 5). v5 신규 파일 bump, v4 보존(과거 이벤트
#     재현용). 전 12 프로파일 system path/version/sha → v5.
#
# cell fragment 신설 (2026-06-04) — classification_prompt_goldset_update.plan.v1 W-F:
#   - o2_d2_regulation_technical_v1: O2×D2 공백 셀. D2 사슬의 2단계 "노형 처리"를
#     선택화(노형 미언급 시 생략 — 빈 단계 트랩 회피).
#   - o3_d3_rai_formal_v1: O3×D3 공백 셀. NRC 질의문/노형 응답 분리, 원문 보존.
#   - o4_d3_relation_formal_v1: O4×D3 공백 셀. 인용하는 쪽(FSAR 위치)↔인용되는
#     규제 ID 양쪽 식별, 인용 문구 원문 보존.
#
# cell fragment 매트릭스 완성 (2026-06-04) — 남은 5 비특화 셀 채움(12/12 특화):
#   - o1_d1_vendor_overview_v1: 노형 현황 + 단일 문서 구조 열거(FSAR Part/Tier).
#   - o1_d3_vendor_formal_v1: 노형이 선언한 공식 기준 원문(규제 원문과 구분).
#   - o2_d1_regulation_overview_v1: 규제군 주제범위·조항 목록 개관.
#   - o3_d1_rai_overview_v1: RAI/감사 분포·패턴 집계.
#   - o4_d1_relation_overview_v1: 문서 관계 분포(인용 규제 분포·관계유형별).
#   이제 12 (O,D) 셀 모두 cell 델타 보유 — generic 합성 잔여 없음.
#
# abstention 판정 주체(설계 메모, 프롬프트 본문 아님): "근거 부족 시 종료"는
# 답변의 *서술 형식*일 뿐, 채택 여부의 최종 *판정*은 코드의 결정론 게이트
# (검색 무결과 RETRIEVAL_NO_RESULT / 검증 실패 VERIFICATION_FAILED /
#  비활성 cell CLARIFICATION_REQUIRED)가 수행한다. 근거-있음이나 의미상
# 어긋난 잔여 오류는 외부 검증(generation_verification_coupling L1.5/L2)이
# 관리하며 프롬프트로 완전히 제거되지는 않는다. abstention 연구도 프롬프트
# 지시만으로는 abstention 이 신뢰되지 않음을 보고하므로, 판정 부담을 system
# 프롬프트에 싣지 않는다. (docs/references/prompt_design_reference.md §1.3)

# Node 1 분류 프롬프트 (llm_classifier_intent_scope_registry.plan.v1).
#   답변 프롬프트(prompt_profiles)와 동일 registry 에서 sha 핀·버전 관리한다.
#   `ClassificationPromptSource`(backend/app/application/prompting/classification_source.py)
#   가 boot 시 fragment 바이트를 재해시해 declared sha 와 대조(무단 편집 차단,
#   prompt_profiles 와 동일 fail-fast 불변식). 분류기의 `classifier_policy_hash`
#   는 이 prompt fragment 의 sha 로 InteractionEvent 에 기록된다(원칙 5).
#   model_options 도 여기서 외부화 — 코드 인라인 상수 제거.
