# composer — spec_driven_v1 N0~N3.5 를 계승하고 N4 만 슬롯 단위로 대체한 variant 의 N4
# 프롬프트(설계 docs/plans/spec_driven_slotwise_generation.design.v1.md).
#   composer_slot      — 슬롯 1개 생성(generation_v1 의 4축을 슬롯 facet 범위로 좁힘 +
#                        이전 슬롯 요지(PRIOR SECTIONS) 참조로 연속성·중복 회피). 자유 텍스트.
#   composer_synthesize— 모든 슬롯 출력 후 "핵심 정리 + 다음 단계 제안" 닫음 블록(본문
#                        재출력 금지 — 슬롯은 이미 조기 스트리밍됨). 자유 텍스트.
#   composer_slot_verify— L1 groundedness 게이트(opt-in, json_schema). 슬롯 출력↔CONTEXT
#                        entailment 판정만(생성 아님 — self-verification 금지).
# 미배선이어도 composer 는 계승한 generation_v1 프롬프트로 graceful 동작(점진 도입).
composer_slot_prompts:
  composer_slot_v1:
    profile_version: v1
    prompt:        {path: spec_driven/composer_slot_v1.md, version: v1, sha256: "f60695141e949d5469e27ca1d94a2625eda5aed326d9e15296f2609b446d162e"}
    # max_tokens — 슬롯 1구획이라 단일 N4(16384)보다 작되, 슬롯 CONTEXT(귀속 청크) + 이전
    # 섹션 *전문* PRIOR + 4축 다층 전개를 한 구획에 담으므로 3000 에선 절단 위험 → 8192.
    model_options: {temperature: 0.1, top_p: 0.9, max_tokens: 8192, seed: 7}

