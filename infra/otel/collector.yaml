receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 512
    timeout: 2s
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  otlp/phoenix:
    endpoint: phoenix:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    # OpenMetrics 노출 → histogram exemplar(trace_id)를 Prometheus 가 스크레이프할 수
    # 있게 한다(plan §4 Prometheus→Tempo 드릴다운의 전제). SDK 는 trace-based exemplar
    # 를 기본 기록하고, Prometheus 는 --enable-feature=exemplar-storage 로 저장한다.
    enable_open_metrics: true
  # Loki 3.x 네이티브 OTLP 수신(/otlp/v1/logs). 앱 OTLP 로그가 trace_id 를 실어
  # Loki↔Tempo 상호 점프를 닫는다(plan §4 W3). 새 수집기(promtail/Alloy) 불필요.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, otlp/phoenix]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
