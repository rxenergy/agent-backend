# AWS MVP profile — frontend-only deployment overlay.
#
# 베이스 compose.yml 과 합치지 않는다. AWS EC2 단일 인스턴스에는 백엔드
# 서비스(agent-api / postgres / opensearch / vllm / phoenix / minio / …) 가
# 일체 떠 있지 않고, OpenWebUI 컨테이너 + Caddy (TLS 리버스 프록시) 만 띄운다.
# 백엔드 호출은 Tailscale MagicDNS(`onprem-agent`) 로 온프레미스로 빠진다.
#
# 사전 조건:
#   1) EC2 호스트에 tailscaled 가 systemd 로 실행 중, hostname=aws-frontend,
#      tag:frontend-aws. tailnet 안에서 onprem-agent:8000 도달 가능.
#   2) /data (EBS gp3) 마운트 — OpenWebUI SQLite + Caddy ACME 데이터 영속화.
#   3) /etc/agent-frontend/aws-mvp.secret.env 가 SSM 에서 생성됨
#      (WEBUI_SECRET_KEY, OPENAI_API_KEYS, AWS_BEARER_TOKEN_BEDROCK, LITELLM_MASTER_KEY).
#
# Usage:
#   docker compose \
#     --env-file ../env/aws-mvp.env \
#     --env-file /etc/agent-frontend/aws-mvp.secret.env \
#     -f compose.aws-mvp.yml up -d

services:

  open-webui:
    # 사내 ECR 에서 pull. 빌드는 CI(또는 개발자 머신)에서.
    image: ${FRONTEND_IMAGE:-agent-saas/frontend:aws-mvp}
    container_name: open-webui
    restart: unless-stopped
    # 호스트에 직접 포트 노출하지 않는다 — Caddy 가 reverse proxy.
    expose:
      - "8080"
    environment:
      # OpenAI-compatible 백엔드 2개를 *공존* 노출(세미콜론 구분, index 로 짝지음):
      #   [0] 온프레 agent-api(SMR 에이전트, Tailscale MagicDNS)
      #   [1] litellm 사이드카(raw Bedrock Claude passthrough)
      # 단수 OPENAI_API_BASE_URL/OPENAI_API_KEY 대신 복수형(URLS/KEYS)을 쓴다.
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS}
      OPENAI_API_KEYS: ${OPENAI_API_KEYS}
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"

      # 보조 task(title/tags/follow-up/autocomplete) 생성을 끈다. task model 미지정
      # 시 OpenWebUI 가 답변 후 대화 전문을 onprem agent 로 재전송 → 동일 질의가
      # 풀 workflow 로 한 번 더 돌며 Phoenix 에 중복 trace 가 집계되는 것을 막는다.
      ENABLE_TITLE_GENERATION: ${ENABLE_TITLE_GENERATION:-false}
      ENABLE_TAGS_GENERATION: ${ENABLE_TAGS_GENERATION:-false}
      ENABLE_AUTOCOMPLETE_GENERATION: ${ENABLE_AUTOCOMPLETE_GENERATION:-false}
      ENABLE_FOLLOW_UP_GENERATION: ${ENABLE_FOLLOW_UP_GENERATION:-false}

      # Auth 정책은 frontend/Dockerfile 의 ENV 가 기본값 — 여기서는 시크릿만.
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_NAME: ${OPEN_WEBUI_NAME:-RX AI Agent v.1.0}
      WEBUI_URL: ${WEBUI_URL}
      WEBUI_SESSION_COOKIE_SECURE: ${WEBUI_SESSION_COOKIE_SECURE:-true}
      WEBUI_SESSION_COOKIE_SAME_SITE: ${WEBUI_SESSION_COOKIE_SAME_SITE:-lax}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}

      # SQLite — OpenWebUI 의 default (sqlite:///${DATA_DIR}/webui.db).
      # DATABASE_URL 은 **아예 set 하지 않는다**. 빈 문자열로 set 하면 OpenWebUI 가
      # 빈 값을 URL 로 파싱하려다 `Unrecognized scheme: ""` 에러로 죽는다
      # (env 가 "unset" 일 때만 default 가 적용됨).
      # 온프레미스/local 프로파일은 Postgres 를 쓰지만 aws-mvp 는 SQLite 전용.
      DATA_DIR: ${DATA_DIR:-/app/backend/data}
    volumes:
      # EBS 볼륨의 /data/open-webui 를 컨테이너 데이터 디렉토리로 마운트
      - /data/open-webui:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    # litellm 사이드카가 떠 있어야 Bedrock connection 이 모델 목록을 채운다.
    # service_started 만 — litellm healthcheck 통과 전이라도 OpenWebUI 는 부팅하고,
    # 모델 목록은 첫 폴링에서 채워진다(온프레 connection 은 litellm 과 무관).
    depends_on:
      litellm:
        condition: service_started

  litellm:
    # off-the-shelf OpenAI↔Bedrock 변환 프록시. 신규 코드 없음 — config.yaml 만.
    image: ghcr.io/berriai/litellm:${LITELLM_VERSION:-main-stable}
    container_name: litellm
    restart: unless-stopped
    # t3.small(2GB RAM) OOM 방지 — litellm 가 호스트 메모리를 무제한 점유하지 못하게
    # 상한을 둔다. 한도 초과 시 호스트 전체가 행에 빠지는 대신 컨테이너만 OOMKill →
    # restart 된다. swap(호스트 2GB)이 추가 완충. open-webui/caddy 몫을 남기는 값.
    mem_limit: ${LITELLM_MEM_LIMIT:-768m}
    # 호스트에 노출하지 않는다 — open-webui 만 compose 네트워크에서 접근.
    expose:
      - "4000"
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      # Bedrock region + bearer token(임시 API 키). 토큰이 있으면 LiteLLM 이
      # SigV4/boto3 를 건너뛰고 Authorization: Bearer 로 호출한다.
      AWS_REGION: ${AWS_REGION}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK}
      # OpenWebUI → litellm 인증 마스터 키(secret.env 로 주입).
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ../litellm/config.yaml:/etc/litellm/config.yaml:ro
      # callback 모듈(strip_history.py)은 config.yaml 과 같은 디렉토리에 있어야
      # LiteLLM 이 `strip_history.proxy_handler_instance` 를 import 할 수 있다.
      - ../litellm/strip_history.py:/etc/litellm/strip_history.py:ro
    healthcheck:
      # litellm 이미지에는 curl 이 없다 — python(이미지에 항상 존재)으로 liveliness
      # 를 친다. curl 기반 healthcheck 는 영원히 starting/unhealthy 에 머문다.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  caddy:
    # Docker Hub anonymous rate limit (100 pulls / 6h per IP) 회피용으로
    # ECR Public 의 caddy 미러 사용. AWS 리전 내부 트래픽이라 더 빠름.
    image: public.ecr.aws/docker/library/caddy:${CADDY_VERSION:-2.8}
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/caddy/data:/data
      - /data/caddy/config:/config
    # depends_on 의도적으로 service_started 만 — service_healthy 로 두면
    # OpenWebUI healthcheck 통과 전까지 Caddy 가 안 떠서 Let's Encrypt 발급도
    # 못 받는 닭-달걀이 된다. Caddy 는 OpenWebUI 가 아직 부팅 중일 때 502 를
    # 잠깐 반환할 뿐, ACME challenge (HTTP-01) 는 OpenWebUI 와 무관하게 처리.
    depends_on:
      open-webui:
        condition: service_started
