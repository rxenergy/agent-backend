# On-premise profile overlay (v2, spec §17 — onprem).
#
# 대상 환경: VM/베어메탈 + NVIDIA GPU (DGX Spark / GB10 / Grace Blackwell 등).
# 외부 네트워크가 없는 폐쇄망을 가정한다. 따라서:
#   - LLM 은 호스트 GPU 의 vLLM(gemma-4-26b-a4b-it) 단일 — 외부 API 호출 없음
#   - 모델 가중치(./models)와 HuggingFace 캐시는 사전에 호스트에 적재
#   - 아티팩트 스토어는 MinIO (S3 외부 미사용)
#
# 사전 준비:
#   1) compressed-tensors(gemma4) 를 지원하는 vLLM 이미지를 호스트 docker
#      데몬에 적재(또는 VLLM_IMAGE 로 지정). 미지원 태그면 기동 시 에러 발생.
#   2) gemma-4-26B-A4B-it-AWQ-4bit 양자화 가중치를 ./models/gemma4-awq 에 적재한다.
#   3) (선택) ./models/hf-cache 에 e5 / fermi 임베더를 미리 받아 hf_cache 볼륨에
#      반영하거나, EMBEDDING_DEVICE 를 onprem.env 에서 cpu 로 두고 backend 가
#      최초 부팅 시 받게 한다. 폐쇄망이면 사전 적재가 필수.
#
# Usage:
#   docker compose \
#     --env-file ../env/onprem.env \
#     --profile onprem \
#     -f compose.yml -f compose.onprem.yml up -d

services:
  agent-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: agent-backend:${BACKEND_TAG:-onprem}
    env_file:
      - ../env/onprem.env
      - path: ../env/onprem.secret.env
        required: false
    environment:
      APP_PROFILE: onprem
      # 외부 네트워크 없음 — 임베더 가중치는 호스트의 ./models 디렉토리(평면 구조)
      # 를 직접 마운트해 사용한다. EMBEDDING_*_MODEL 환경변수가 컨테이너 내
      # 절대 경로(/app/models/...) 를 가리키므로 HF 캐시 레이아웃 변환 불필요.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      # 호스트의 ./models 를 read-only 로 마운트. vLLM 컨테이너와 동일 경로지만,
      # agent-api 에는 임베더(e5, fermi)용으로 별도 노출한다.
      - ../../models:/app/models:ro
      # follow-up 참조 추출용 메타데이터 + 캐시.
      - ../../data/ref:/app/data/ref
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      vllm:
        condition: service_healthy

  open-webui:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        OPENWEBUI_VERSION: ${OPENWEBUI_VERSION:-v0.9.5}
    image: agent-saas/frontend:${BACKEND_TAG:-onprem}
    environment:
      ENABLE_SIGNUP: "true"
      DEFAULT_USER_ROLE: admin
      WEBUI_SESSION_COOKIE_SECURE: "false"
      WEBUI_URL: http://localhost:${OPEN_WEBUI_PORT:-3100}

  # ─────────────────────────────────────────────────────────────────────────
  # Phoenix — onprem 에서만 Prompt Playground 가 내부망 vLLM 을 직접 호출하도록
  # OpenAI-호환 base URL 을 덮어쓴다. base compose.yml 의 phoenix: 블록을 병합 확장.
  #   - OPENAI_BASE_URL: 같은 compose default 네트워크의 vllm 컨테이너(vllm:8000/v1).
  #   - OPENAI_API_KEY: vLLM 은 인증이 없으므로 placeholder 면 충분.
  # ⚠ 폐쇄망 정책상 Playground 에서 OpenAI/Anthropic 등 외부 provider 는 선택 금지.
  #   외부 호출 대상은 오직 내부망 vLLM(gemma-4-26b-a4b-it) 하나다.
  # served-model 이름은 Playground model 필드에 VLLM_SERVED_MODEL_NAME 값과 동일하게 입력.
  # ─────────────────────────────────────────────────────────────────────────
  phoenix:
    environment:
      PHOENIX_WORKING_DIR: /data/phoenix
      OPENAI_BASE_URL: ${PHOENIX_OPENAI_BASE_URL:-http://vllm:8000/v1}
      OPENAI_API_KEY: ${PHOENIX_OPENAI_API_KEY:-dummy}
    depends_on:
      vllm:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────
  # vLLM — onprem profile only. docker/vllm/docker-compose.yml 과 동일한
  # 런타임 파라미터를 사용하되, compose 본체에 합류시켜 agent-api 와 같은
  # 네트워크/라이프사이클에서 동작시킨다.
  #
  # 현재 서빙 모델: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit (compressed-tensors,
  # pack-quantized 4bit). ./models/gemma4-awq 에 적재. served-model-name 은
  # 비양자화 버전과 동일(gemma-4-26b-a4b-it) — LLM_POOL 변경 불필요.
  # ─────────────────────────────────────────────────────────────────────────
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: agent-backend-vllm
    profiles: ["onprem"]
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    ports:
      # 호스트에서 직접 디버깅용으로 8001 로 노출. 컨테이너 간 통신은 vllm:8000.
      - "8001:8000"
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      # 프로젝트 루트의 ./models 디렉토리를 read-only 마운트.
      # docker/vllm/docker-compose.yml 과 동일한 컨테이너 경로(/workspace/models).
      - ../../models:/workspace/models:ro
    command:
      # vllm/vllm-openai 이미지는 내부 엔트리포인트가 잡혀있어 serve부터 적거나 전체를 적어줍니다.
      - ${VLLM_MODEL_DIR:-/workspace/models/gemma4-awq}
      - --host=0.0.0.0
      - --port=8000
      - --served-model-name=${VLLM_SERVED_MODEL_NAME:-gemma-4-26b-a4b-it}
      # compressed-tensors(AWQ pack-quantized) — config.json 자동감지되지만 명시.
      - --quantization=compressed-tensors
      # 컨텍스트는 모델 상한(max_position_embeddings=131072, 128)까지 끌어올린다.
      # ⚠ KV cache 부족으로 128K 전체가 안 올라가면 vLLM 이 가능한 최대치를 에러로
      #   알려준다 → VLLM_MAX_MODEL_LEN/VLLM_MAX_NUM_BATCHED_TOKENS 를 그 값으로
      #   낮춰 재기동(필요 시 VLLM_GPU_MEMORY_UTILIZATION 0.70→0.80~0.90 상향).
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-131072}
      - --kv-cache-dtype=${VLLM_KV_CACHE_DTYPE:-fp8}
      # 동시성/배칭 (test 메인 노드 .env.main 기준: max-num-seqs=64, batched-tokens=8192).
      - --max-num-seqs=${VLLM_MAX_NUM_SEQS:-64}
      - --max-num-batched-tokens=${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}
      - --gpu-memory-utilization=${VLLM_GPU_MEMORY_UTILIZATION:-0.70}
      - --load-format=safetensors
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────────────────────
  # [구버전] 비양자화 gemma4 (./models/gemma4, ~51GB) — 보존용, 미사용.
  # AWQ 양자화 모델로 교체됨. 롤백하려면 위 vllm: 블록을 주석 처리하고 아래
  # 블록의 주석을 해제한다 (양자화/컨텍스트 파라미터 차이 주의).
  # ─────────────────────────────────────────────────────────────────────────
  # vllm:
  #   image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
  #   container_name: agent-backend-vllm
  #   profiles: ["onprem"]
  #   restart: unless-stopped
  #   ipc: host
  #   shm_size: "16gb"
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     HF_HUB_OFFLINE: "1"
  #     TRANSFORMERS_OFFLINE: "1"
  #   volumes:
  #     - ../../models:/workspace/models:ro
  #   command:
  #     - /workspace/models/gemma4
  #     - --host=0.0.0.0
  #     - --port=8000
  #     - --served-model-name=${VLLM_SERVED_MODEL_NAME:-gemma-4-26b-a4b-it}
  #     - --max-model-len=16384
  #     - --kv-cache-dtype=fp8
  #     - --max-num-batched-tokens=4096
  #     - --gpu-memory-utilization=0.70
  #     - --load-format=safetensors
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 30
  #     start_period: 180s
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  # OpenSearch — base compose 의 정의를 그대로 사용 (docker/opensearch 와 동등 설정).
  # GPU 와 메모리 경합이 있으므로 운영 시 OPENSEARCH_JAVA_OPTS / mem_limit 을
  # 환경에 맞춰 조정한다. 본 overlay 는 추가 override 없음.
  #
  # ⚠ 시드/인덱스 초기화는 자동 수행되지 않는다.
  #   - opensearch_data 명명 볼륨에 사전 적재된 색인을 그대로 마운트해 사용한다.
  #   - `make seed`, `make seed-encode`, `make opensearch-init` 은 모두 `--recreate`
  #     경로를 거치므로 local 개발 환경 전용이며, Makefile 의 _guard-local-only
  #     가드가 onprem 스택 가동 중 실행을 차단한다.
  #   - 새 인덱스를 옮겨와야 한다면 snapshot/restore 또는 opensearch_data 볼륨
  #     스냅샷 교체로 진행한다.
  opensearch:
    volumes:
      - opensearch_snapshots:/usr/share/opensearch/snapshots
    environment:
      - path.repo=/usr/share/opensearch/snapshots

volumes:
  # onprem 전용: 사전 적재된 외부 볼륨을 마운트한다.
  # base compose.yml 의 `opensearch_data:` (자동 생성) 선언을 덮어쓰며,
  # 실제 호스트 볼륨 `opensearch-data-single-gpu` (nrc-all-v1 색인 보유)
  # 를 가리키도록 매핑한다. local 프로파일은 영향 없음.
  opensearch_data:
    external: true
    name: opensearch-data-single-gpu

  # Snapshot repository 저장소 (fs 타입). compose 가 자동 생성하지 않으므로
  # 호스트에서 사전에 디렉토리를 만들고 OpenSearch 컨테이너 사용자(uid 1000)
  # 에게 쓰기 권한을 부여해야 한다:
  #   sudo mkdir -p /srv/os-snapshots
  #   sudo chown 1000:1000 /srv/os-snapshots
  # 컨테이너 내부 경로(/usr/share/opensearch/snapshots) 는 opensearch.yml 의
  # path.repo 화이트리스트와 일치해야 한다.
  # 스택 가동 후 한 번 repository 를 등록한다:
  #   curl -X PUT http://localhost:9200/_snapshot/onprem_fs \
  #     -H 'Content-Type: application/json' \
  #     -d '{"type":"fs","settings":{"location":"/usr/share/opensearch/snapshots","compress":true}}'
  opensearch_snapshots:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/os-snapshots