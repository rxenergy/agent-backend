# Local profile overrides:
#   - build agent-api from backend/Dockerfile (instead of pulling)
#   - build open-webui from frontend/Dockerfile (RX-branded image)
#   - relax cookie-secure / signup gates so first-user signup works over plain http
# Compose with: docker compose --profile local -f compose.yml -f compose.local.yml up

services:
  agent-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: agent-backend:dev
    environment:
      APP_PROFILE: local
      # 임베더 가중치(e5, fermi)를 호스트 ./models 에서 직접 로드한다. fermi-1024 는
      # HF gated repo 라 토큰 없이는 다운로드가 401 로 막혀 local(fake) retriever 로
      # fallback 된다 — 로컬 마운트로 우회한다. EMBEDDING_*_MODEL 이 /app/models 절대
      # 경로를 가리키므로 HF 조회 자체를 하지 않는다.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ../../models:/app/models:ro
    depends_on:
      otel-collector:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # local 전용: fs-snapshot repository 를 프로젝트 경로에 바인딩한다.
  # 컨테이너 내부 경로(/usr/share/opensearch/snapshots) 는 opensearch.yml 의
  # path.repo 화이트리스트와 일치한다. onprem overlay 는 동일 컨테이너 경로를
  # /srv/os-snapshots 에 바인딩하므로, 이 마운트는 base 가 아닌 local overlay
  # 에만 둔다 (base 에 두면 두 바인딩이 충돌). 스냅샷 본체는 .gitignore 로
  # 저장소 커밋에서 제외된다 (수 GB).
  opensearch:
    volumes:
      - ../opensearch/snapshots:/usr/share/opensearch/snapshots

  open-webui:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        OPENWEBUI_VERSION: ${OPENWEBUI_VERSION:-v0.9.5}
    image: agent-saas/frontend:dev
    environment:
      # Local-only overrides on top of the values baked into frontend/Dockerfile.
      # The image ships with WEBUI_AUTH=true, ENABLE_SIGNUP=false,
      # DEFAULT_USER_ROLE=pending, WEBUI_SESSION_COOKIE_SECURE=true —
      # appropriate for prod, but they prevent first-user signup over plain http.
      ENABLE_SIGNUP: "true"
      DEFAULT_USER_ROLE: admin
      WEBUI_SESSION_COOKIE_SECURE: "false"
      WEBUI_URL: http://localhost:${OPEN_WEBUI_PORT:-3100}
