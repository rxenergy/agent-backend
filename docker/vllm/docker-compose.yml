# 독립 vLLM 스택 — Gemma 4 26B A4B-it OpenAI 호환 서빙.
#
# 검색 스택(루트 docker-compose.yml)과 라이프사이클을 분리한다.
# 모델 로딩이 수 분 단위이고 재시작 비용이 커서 같이 묶지 않는다.
#
# 사전 준비:
#   1) https://github.com/eugr/spark-vllm-docker 클론 후 `./build-and-copy.sh`
#      로 GB10 호환 이미지(`vllm-node:latest`)를 호스트 docker에 적재.
#   2) huggingface-cli 로 모델을 `./models/google/gemma-4-26B-A4B-it`
#      경로에 미리 받아둔다. (자세한 절차는 docker/vllm/README.md 참조)
#
# 기동:
#   docker compose -f docker/vllm/docker-compose.yml up -d

name: agent-backend-vllm

services:
  vllm:
    image: vllm-node:latest
    container_name: agent-backend-vllm
    ipc: host
    shm_size: "16gb"
    ports:
      - "8001:8000"
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      # 본 compose가 docker/vllm/ 위치이므로 상대 경로로 루트 models 마운트.
      - ../../models:/workspace/models:ro
    command:
      - vllm
      - serve
      - /workspace/models/gemma4
      - --host=0.0.0.0
      - --port=8000
      - --served-model-name=gemma-4-26b-a4b-it
      - --max-model-len=16384
      - --max-num-batched-tokens=4096
      - --gpu-memory-utilization=0.4
      - --load-format=safetensors
      - --enforce-eager
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
