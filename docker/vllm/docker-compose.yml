name: agent-backend-vllm

services:
  vllm:
    # 변경: 공식 vLLM OpenAI 호환 서버 이미지 사용
    image: vllm/vllm-openai:latest
    container_name: agent-backend-vllm
    ipc: host
    shm_size: "16gb"
    ports:
      - "8001:8000"
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      # (선택) GPU가 여러 대라면 사용할 GPU 번호를 지정 (예: 0번 GPU만 사용)
      # - CUDA_VISIBLE_DEVICES=0 
    volumes:
      # 로컬의 가상환경이나 모델 경로 상태에 맞춰 마운트
      - ../../models:/workspace/models:ro
    command:
      # vllm/vllm-openai 이미지는 내부 엔트리포인트가 잡혀있어 serve부터 적거나 전체를 적어줍니다.
      - /workspace/models/gemma4
      - --host=0.0.0.0
      - --port=8000
      - --served-model-name=gemma-4-26b-a4b-it
      - --max-model-len=8192            # uv 환경 성공 기준에 맞춰 늘리거나 줄이세요 (기본 8192 추천)
      - --max-num-batched-tokens=4096
      - --gpu-memory-utilization=0.90   # uv환경처럼 GPU 독점 시 0.90 이상 추천
      - --load-format=safetensors
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all  # 특정 GPU만 쓰려면 1로 변경 가능
              capabilities: [gpu]