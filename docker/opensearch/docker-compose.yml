# 전략 A' — 단일 인덱스 (nrc-all-v3) — v1+3.6 경로
# OpenSearch 3.6.0만. ml-commons / fermi-encoder / model-host 사이드카 미사용.
#
# 인코딩은 호스트의 Python(CUDA)이 직접 수행하고, OpenSearch에는 사전 인코딩
# 결과(dense_e5 벡터, sparse_fermi rank_features dict)를 그대로 색인한다.
# 검색은 OpenSearch 3.0+의 hybrid query + hybrid.filter 사용.
#
# 별도 볼륨(opensearch-data-single-gpu)을 사용해 single/ 스택과 분리.
# 동일 포트(9200)이므로 두 스택을 동시에 띄울 수 없다.

name: nrc-bench-single-gpu

services:
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: opensearch-single-gpu
    environment:
      - cluster.name=nrc-bench-single-gpu
      - node.name=nrc-bench-single-gpu-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms6g -Xmx6g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: 12g
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data-single-gpu:/usr/share/opensearch/data
      - ./opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  opensearch-data-single-gpu:
    name: opensearch-data-single-gpu
